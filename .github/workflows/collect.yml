name: Collect News

on:
  schedule:
    - cron: '0 */6 * * *' # 6시간마다 (UTC 기준 0,6,12,18시)
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger collection endpoint
        run: |
          curl -X GET "${{ secrets.SITE_URL }}/api/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail \
            --max-time 90
